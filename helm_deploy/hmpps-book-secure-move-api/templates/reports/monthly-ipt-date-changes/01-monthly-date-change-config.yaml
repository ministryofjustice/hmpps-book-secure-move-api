{{- $fullName := printf "%s-%s" (include "generic-service.fullname" $) "daily-ipt-config" | trunc 52 }}
{{- if .Values.scripts.reports.dailyIpt.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $fullName }}
data:
  from-date: "1 day ago"
  to-date: "1 month ago"
  subject: "BaSM IPT Date Change Report [TODAY_DATE]"
  body: "BaSM IPT date change report for [LAST_MONTH] is available at the link below."
  filename: "basm-ipt-date-change-report-[TODAY_DATE]"
  retention: "1 week"
  confirm_email: "false"
  report_sql: |-
    SELECT 
    reference,
    prison_number,
    last_name,
    from_loc,
    to_loc,
    created_at AS move_requested,
    move_date,
    occurred_at AS date_changed_time,
    (regexp_match(object, 'date: ([0-9]{4}-[0-9]{2}-[0-9]{2})'))[1] AS original_date,
    details ->> 'date' AS new_date,
    details ->> 'date_changed_reason' AS reason
    FROM
      (SELECT m.id,
        m.created_at,
        m.reference,
        m.date as move_date,
        e.details,
        e.occurred_at,
        v.object,
        p.last_name,
        p.prison_number,
        fl.title AS from_loc,
        tl.title AS to_loc,
    
        EXTRACT(YEAR FROM v.created_at) AS v_year,
        EXTRACT(MONTH FROM v.created_at) AS v_month,
        EXTRACT(DAY FROM v.created_at) AS v_day,
        EXTRACT(HOUR FROM v.created_at) AS v_hour,
        EXTRACT(MINUTE FROM v.created_at) AS v_minute,
  
        EXTRACT(YEAR FROM e.created_at) AS e_year,
        EXTRACT(MONTH FROM e.created_at) AS e_month,
        EXTRACT(DAY FROM e.created_at) AS e_day,
        EXTRACT(HOUR FROM e.created_at) AS e_hour,
        EXTRACT(MINUTE FROM e.created_at) AS e_minute
    
        FROM moves m
        JOIN generic_events e ON e.eventable_type = 'Move' and e.eventable_id = m.id
        JOIN versions v ON v.item_id = m.id and v.item_type = 'Move'
        JOIN profiles pro ON pro.id = m.profile_id
        JOIN people p ON pro.person_id = p.id
        JOIN locations fl ON m.from_location_id = fl.id
        JOIN locations tl ON m.to_location_id = tl.id
        WHERE m.status = 'completed'
        AND m.date between '2026-04-01' and '2026-04-30'
        AND m.move_type = 'prison_transfer'
        AND e.type = 'GenericEvent::MoveDateChanged'
        AND v.event='update'
      ) as blah
    WHERE v_year = e_year
    AND e_month = v_month
    AND e_day = v_day
    AND e_hour = v_hour
    AND e_minute = v_minute
    ORDER BY move_date, reference, occurred_at
{{- end }}
